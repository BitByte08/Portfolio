name: Deploy backend to Oracle VM

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "compose.yml"
      - "deploy/oracle/**"
      - ".github/workflows/deploy-backend-oracle.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bitbyte08/portfolio-backend
  DEPLOY_PATH: ${{ secrets.ORACLE_DEPLOY_PATH || '/opt/portfolio' }}
  ORACLE_SSH_HOST: ${{ secrets.ORACLE_SSH_HOST }}
  ORACLE_SSH_USER: ${{ secrets.ORACLE_SSH_USER }}
  ORACLE_SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
  ORACLE_SSH_PASSPHRASE: ${{ secrets.ORACLE_SSH_PASSPHRASE }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-oracle:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Verify deploy secrets
        run: |
          test -n "$DEPLOY_PATH"
          test -n "$ORACLE_SSH_HOST"
          test -n "$ORACLE_SSH_USER"
          test -n "$ORACLE_SSH_KEY"

      - name: Prepare SSH key
        run: |
          key_dir="$GITHUB_WORKSPACE/.tmp"
          key_path="$key_dir/oracle-ssh-key"

          mkdir -p "$key_dir"
          printf '%s' "$ORACLE_SSH_KEY" | tr -d '\r' > "$key_path"
          chmod 644 "$key_path"
          echo "SSH_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Deploy on Oracle VM
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
        with:
          host: ${{ env.ORACLE_SSH_HOST }}
          username: ${{ env.ORACLE_SSH_USER }}
          key_path: ${{ env.SSH_KEY_PATH }}
          passphrase: ${{ env.ORACLE_SSH_PASSPHRASE }}
          script_stop: true
          debug: true
          envs: DEPLOY_PATH,GITHUB_REF_NAME,GITHUB_SHA
          script: |
            set -euxo pipefail

            echo "DEPLOY_PATH=$DEPLOY_PATH"
            echo "GITHUB_REF_NAME=$GITHUB_REF_NAME"
            echo "GITHUB_SHA=$GITHUB_SHA"
            command -v git
            command -v docker
            docker compose version

            test -d "$DEPLOY_PATH/.git"

            git -C "$DEPLOY_PATH" pull --ff-only origin "$GITHUB_REF_NAME"

            cd "$DEPLOY_PATH/deploy/oracle"
            BACKEND_IMAGE_TAG="$GITHUB_SHA" docker compose -f docker-compose.yml pull backend
            BACKEND_IMAGE_TAG="$GITHUB_SHA" docker compose -f docker-compose.yml up -d --remove-orphans

      - name: Cleanup SSH key
        if: always()
        run: rm -f "$SSH_KEY_PATH"
