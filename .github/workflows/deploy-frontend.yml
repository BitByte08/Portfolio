name: Deploy frontend to Cloudflare Workers

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "components/**"
      - "content/**"
      - "docs/**"
      - "fonts/**"
      - "lib/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"
      - "open-next.config.ts"
      - "wrangler.jsonc"
      - "tsconfig.json"
      - ".github/workflows/deploy-frontend.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      PORTFOLIO_BACKEND_URL: ${{ secrets.PORTFOLIO_BACKEND_URL }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify deploy secrets
        run: |
          test -n "$PORTFOLIO_BACKEND_URL"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers
        run: npm run deploy
