<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="융합하는 개발자 정태양입니다">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f1115"/>
      <stop offset="100%" stop-color="#151d26"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f4d06f"/>
      <stop offset="100%" stop-color="#20c997"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1020" cy="140" r="220" fill="#20c997" fill-opacity="0.12"/>
  <circle cx="220" cy="510" r="180" fill="#f4d06f" fill-opacity="0.12"/>
  <text x="96" y="182" fill="#f5f7fb" font-family="Inter, Arial, sans-serif" font-size="24" letter-spacing="2">PORTFOLIO</text>
  <text x="96" y="288" fill="#f5f7fb" font-family="Pretendard, Noto Sans KR, Arial, sans-serif" font-size="68" font-weight="700">융합하는 개발자</text>
  <text x="96" y="364" fill="#f5f7fb" font-family="Pretendard, Noto Sans KR, Arial, sans-serif" font-size="68" font-weight="700">정태양입니다</text>
  <text x="96" y="452" fill="#b8c3cf" font-family="Pretendard, Noto Sans KR, Arial, sans-serif" font-size="28">제품, 프론트엔드, 백엔드를 연결해 실무형 경험을 만드는 포트폴리오</text>
  <rect x="96" y="500" width="240" height="4" rx="2" fill="url(#accent)"/>
